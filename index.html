<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio+ by Sprocklight</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      color: #fff;
      line-height: 1.4;
    }
    header {
      padding: 3rem 5%;
      text-align: center;
      border-bottom: 1px solid #222;
    }
    h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: -2px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      padding: 3rem 5%;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: #111;
      transition: transform .3s ease, box-shadow .3s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,255,255,0.1);
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.9;
      transition: opacity .3s;
    }
    .card:hover img { opacity: 1; }
    .info {
      padding: 1.5rem;
    }
    .title { font-size: 1.4rem; margin: 0; }
    .tag { font-size: 0.9rem; color: #0ff; opacity: 0.7; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .4s;
    }
    .modal.show { opacity: 1; }
    .modal-content {
      max-width: 90%;
      max-height: 90vh;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 60px rgba(0,255,255,0.2);
    }
    .close {
      position: absolute;
      top: 1rem; right: 1.5rem;
      font-size: 2rem;
      color: #0ff;
      cursor: pointer;
    }
    .hero { width: 100%; height: auto; }
    .details { padding: 2rem; }
  </style>
</head>
<body>

  <header>
    <h1>Portfolio+</h1>
    <p style="opacity:0.6; margin-top:0.5rem;">Sprocklight — Design & Dev</p>
  </header>

  <div class="grid">
    <!-- Card 1 -->
    <div class="card" onclick="openModal('skin-cartel')">
      <img src="https://via.placeholder.com/600x400/111/0ff?text=SkinCartel" alt="SkinCartel">
      <div class="info">
        <h2 class="title">SkinCartel</h2>
        <p class="tag">Streetwear Rebrand • 2025</p>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card" onclick="openModal('neon-vibes')">
      <img src="https://via.placeholder.com/600x450/111/0ff?text=Neon+Vibes" alt="Neon Vibes">
      <div class="info">
        <h2 class="title">Neon Vibes</h2>
        <p class="tag">UI Concept • 3D Motion</p>
      </div>
    </div>

    <!-- Add more cards like this... -->
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <img class="hero" id="modalImg" src="" alt="Project">
      <div class="details" id="modalDetails">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc">Loading...</p>
      </div>
    </div>
  </div>

  <script>
    const projects = {
      'skin-cartel': {
        img: 'https://via.placeholder.com/1200x800/111/0ff?text=SkinCartel+Hero',
        title: 'SkinCartel',
        desc: 'Rebranded a Gen-Z streetwear line—bold typography, electric cyan accents, and a custom typeface. Built in Figma, prototyped in Framer. Took three weeks.'
      },
      'neon-vibes': {
        img: 'https://via.placeholder.com/1200x900/111/0ff?text=Neon+Vibes+Hero',
        title: 'Neon Vibes',
        desc: 'Experimental UI with 3D glassmorphism and scroll-triggered animations. All motion done in After Effects + Lottie. Client loved the glow.'
      }
      // Add your real projects here
    };

    function openModal(id) {
      const data = projects ;
      document.getElementById('modalImg').src = data.img;
      document.getElementById('modalTitle').textContent = data.title;
      document.getElementById('modalDesc').textContent = data.desc;
      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = 'auto';
    }

    // Close on outside click
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
  </script>
</body>
</html>
