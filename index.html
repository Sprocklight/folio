<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Sprocklight | Strategic Advisory & Digital Precision</title>
    
    <link rel="icon" type="image/jpg" href="images/favicon.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff; 
            --text-main: #001A70;
            --text-body: #2d3436;
            --line-color: #f2f2f2; 
            --header-bg: rgba(242, 242, 245, 0.9); 
            --glass-blur: blur(25px) saturate(140%);
        }

        /* --- Global Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        html, body {
            height: 100%;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; position: fixed; width: 100%; }
        body.modal-open #header { display: none !important; }

        /* --- Wide Pill Home Header --- */
        #header {
            position: fixed;
            top: 20px;
            left: 2%;
            right: 2%;
            z-index: 1000;
            padding: 1.1rem 3rem;
            background: var(--header-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #header h1 a {
            text-decoration: none; color: var(--text-main);
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px;
        }

        nav a { 
            text-decoration: none; color: var(--text-main); font-weight: 600; 
            font-size: 0.6rem; text-transform: uppercase; margin-left: 2rem; letter-spacing: 1.5px;
        }

        /* --- Modal Header --- */
        .modal-header {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 1000px;
            z-index: 10005;
            padding: 0.85rem 2.2rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-trigger {
            background: none; border: none; cursor: pointer; width: 20px; height: 20px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .close-trigger::before, .close-trigger::after {
            content: ''; position: absolute; width: 100%; height: 1.5px; background-color: var(--text-main);
        }
        .close-trigger::before { transform: rotate(45deg); }
        .close-trigger::after { transform: rotate(-45deg); }

        /* --- Home Grid (Restored Font Weights) --- */
        #main {
            padding-top: 110px; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr);
            background: #ffffff; 
            gap: 1px; 
        }

        .thumb { 
            background: #fff; padding: 4.5rem 2.5rem; cursor: pointer; 
            border-bottom: 1px solid var(--line-color); border-right: 1px solid var(--line-color);
        }

        .thumb .image-wrap { width: 100%; aspect-ratio: 16/10; overflow: hidden; margin-bottom: 1.8rem; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .thumb-info h2 { 
            font-family: 'Inter', sans-serif; /* Explicit Fix */
            font-size: 0.65rem; 
            font-weight: 800; /* Bold Fix */
            text-transform: uppercase; 
            margin-bottom: 4px; 
            color: var(--text-main);
        }
        .thumb-info p { 
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem; 
            color: #aaa; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* --- THE ULTIMATE SAFARI FULL-BLEED FIX --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            background: #ffffff;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-body { width: 100%; position: relative; }

        .modal-hero-container { 
            width: 100%; 
            height: 80vh; 
            position: relative;
            /* Force image to ignore Safe Area on iOS */
            margin-top: -100px; 
            padding-top: 100px;
            background: #f8f8f8;
            overflow: hidden;
        }

        .modal-main-img { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            object-fit: cover; 
            display: block;
        }

        /* --- Content Area --- */
        .modal-content-area { 
            width: 100%; max-width: 1100px; margin: 0 auto; padding: 4rem 5% 10rem;
            opacity: 0; transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .modal-content-area.animate-in { opacity: 1; transform: translateY(0); }

        .lower-left-meta {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;
            border-left: 2px solid var(--text-main); padding-left: 30px; margin-bottom: 3.5rem;
        }

        .meta-label { font-size: 0.55rem; font-weight: 800; color: #ccc; text-transform: uppercase; margin-bottom: 8px; }
        .meta-value { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }

        .modal-desc-wrap h2 { 
            font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 7.5vw, 6rem); 
            font-weight: 400; line-height: 0.85; color: var(--text-main); letter-spacing: -3px; margin-bottom: 2rem;
        }
        .modal-desc-wrap p { font-size: 1.4rem; line-height: 1.5; color: var(--text-body); max-width: 820px; font-weight: 400; }

        /* --- Footer --- */
        #footer { padding: 10rem 5%; background: var(--text-main); color: #fff; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; max-width: 1100px; margin: 0 auto; align-items: end; }
        .footer-logo-wrap h2 { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; line-height: 0.85; letter-spacing: -2px; }
        .contact-link {
            color: #fff; text-decoration: none; font-size: 1.8rem; font-family: 'Cormorant Garamond', serif; 
            font-weight: 400; display: block; margin-bottom: 0.8rem;
        }

        /* --- Mobile Hub --- */
        @media (max-width: 768px) {
            #header, .modal-header { width: 92%; padding: 0.8rem 1.2rem; }
            #main { grid-template-columns: 1fr; padding-top: 100px; }
            .thumb { padding: 2.5rem 1.5rem; } 
            .thumb .image-wrap { aspect-ratio: 4/3; margin-bottom: 1rem; }
            
            /* Taller mobile hero for impact */
            .modal-hero-container { height: 65vh; margin-top: -150px; padding-top: 150px; }
            .modal-content-area { padding-top: 3rem; }
            .modal-desc-wrap h2 { font-size: 3.2rem; }
            .lower-left-meta { grid-template-columns: 1fr; gap: 20px; margin-bottom: 2.5rem; }
            .footer-grid { grid-template-columns: 1fr; gap: 5rem; }
            .contact-link { font-size: 1.3rem; word-break: break-all; }
        }
    </style>
</head>
<body>

    <header id="header">
        <h1><a href="#">Sprocklight</a></h1>
        <nav>
            <a href="https://sprocklight.github.io/home/">Home</a>
            <a href="#footer">Inquiry</a>
        </nav>
    </header>

    <div id="main">
        <article class="thumb" onclick="openProject('Visual Expertise.', 'Design Strategy', 'images/thumbs/01.jpg', 'Bridging technical precision and creative energy for WKNDR.', '1920 x 1080', '2026')">
            <div class="image-wrap"><img src="images/thumbs/01.jpg"></div>
            <div class="thumb-info"><h2>WKNDR Creative</h2><p>Identity • 2026</p></div>
        </article>
        <article class="thumb" onclick="openProject('Motion Clarity.', 'Visual Effects', 'images/thumbs/07.gif', 'High-fidelity motion design created for luxury branding.', '1080 x 1080', '2025')">
            <div class="image-wrap"><img src="images/thumbs/07.gif"></div>
            <div class="thumb-info"><h2>SkinCartel</h2><p>Motion • 2025</p></div>
        </article>
        </div>

    <div id="modal-overlay">
        <div class="modal-header">
            <span style="font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;">PROJECT INDEX</span>
            <button class="close-trigger" onclick="closeProject()"></button>
        </div>
        <div class="modal-body">
            <div class="modal-hero-container">
                <img src="" id="modal-img" class="modal-main-img">
            </div>
            <div id="modal-content" class="modal-content-area">
                <div class="lower-left-meta">
                    <div><div class="meta-label">Technical Scale</div><div id="modal-dim" class="meta-value">---</div></div>
                    <div><div class="meta-label">Completion</div><div id="modal-year" class="meta-value">---</div></div>
                    <div><div class="meta-label">Domain</div><div id="modal-cat" class="meta-value">---</div></div>
                </div>
                <div class="modal-desc-wrap">
                    <h2 id="modal-title">---</h2>
                    <p id="modal-text">---</p>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer">
        <div class="footer-grid">
            <div class="footer-logo-wrap">
                <h2>Digital<br>Precision.</h2>
                <p style="margin-top:2.5rem; opacity:0.4; font-size:0.65rem; text-transform: uppercase; letter-spacing: 2px;">© 2026 SPROCKLIGHT MNL</p>
            </div>
            <div>
                <a href="mailto:anthony.juco@gmail.com" class="contact-link">anthony.juco@gmail.com <span>→</span></a>
                <a href="https://www.linkedin.com/company/sprocklightmnl/" target="_blank" class="contact-link">LinkedIn <span>↗</span></a>
            </div>
        </div>
    </footer>

    <script>
        function openProject(title, category, img, text, dim, year) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-cat').innerText = category;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-dim').innerText = dim;
            document.getElementById('modal-year').innerText = year;
            
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.classList.add('modal-open');
            document.getElementById('modal-overlay').scrollTop = 0;
            setTimeout(() => { document.getElementById('modal-content').classList.add('animate-in'); }, 50);
        }
        function closeProject() {
            document.getElementById('modal-content').classList.remove('animate-in');
            setTimeout(() => {
                document.getElementById('modal-overlay').style.display = 'none';
                document.body.classList.remove('modal-open');
            }, 400);
        }
    </script>
</body>
</html>
