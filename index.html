<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Sprocklight | Precision Archive</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F4F7F9;
            --text-main: #001A70;
            --text-body: #2d3436;
            --line-color: rgba(0, 26, 112, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        /* --- Global Header --- */
        #header {
            position: fixed; top: 0; width: 100%; z-index: 100; padding: 1.5rem 4%;
            background: rgba(244, 247, 249, 0.7); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--line-color);
        }

        #header h1 a {
            text-decoration: none; color: var(--text-main);
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px;
        }

        nav a { 
            text-decoration: none; color: var(--text-main); font-weight: 600; 
            font-size: 0.65rem; text-transform: uppercase; margin-left: 2.5rem; letter-spacing: 1px;
        }

        /* --- Grid Layout --- */
        #main {
            padding: 80px 0 0 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--line-color);
        }

        .thumb {
            background: #fff; padding: 3.5rem 1.5rem; cursor: pointer;
            transition: background 0.4s ease;
        }

        .thumb:hover { background: var(--bg-color); }

        .thumb .image-wrap {
            width: 100%; aspect-ratio: 16/10; overflow: hidden; margin-bottom: 1.5rem;
            border: 1px solid var(--line-color);
        }

        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .thumb:hover img { transform: scale(1.04); }

        .thumb-info h2 { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .thumb-info p { font-size: 0.6rem; color: #777; text-transform: uppercase; letter-spacing: 1.5px; }

        /* --- The Hero Modal (Burkhalter Style) --- */
        #modal-overlay {
            position: fixed; inset: 0; z-index: 1001; background: #fff;
            display: none; flex-direction: column; overflow-y: auto;
        }

        /* FLOATING MODAL HEADER */
        .modal-header {
            padding: 1.2rem 4%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 101; 
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--line-color);
        }

        .close-btn {
            background: none; border: 1px solid var(--text-main); padding: 5px 15px;
            font-size: 0.6rem; font-weight: 800; cursor: pointer; color: var(--text-main);
            text-transform: uppercase;
        }

        /* HERO IMAGE CONTAINER */
        .modal-hero-container {
            width: 100%;
            height: 85vh; /* Hero Height */
            position: relative;
            background: #000;
        }

        .modal-main-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes it act as a background */
            display: block;
        }

        /* CONTENT SECTION BELOW PHOTO */
        .modal-content-area {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 4rem 4% 10rem;
        }

        .lower-left-meta {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            border-left: 3px solid var(--text-main); padding-left: 25px;
            margin-bottom: 5rem;
        }

        .meta-label { font-size: 0.55rem; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 5px; }
        .meta-value { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-main); }

        .modal-desc-wrap h2 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 5rem; font-weight: 400; line-height: 0.9; 
            color: var(--text-main); letter-spacing: -2px; margin-bottom: 2rem;
        }

        .modal-desc-wrap p { 
            font-size: 1.3rem; line-height: 1.6; color: var(--text-body); max-width: 800px;
        }

        /* --- Footer --- */
        #footer { padding: 8rem 4%; background: var(--text-main); color: #fff; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; max-width: 1400px; margin: 0 auto; }
        .footer-grid h2 { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; line-height: 0.85; }

        input, textarea {
            width: 100%; background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 1.2rem 0; color: #fff; font-family: inherit; margin-bottom: 1.5rem;
        }

        /* --- Responsive --- */
        @media (max-width: 1100px) { #main { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            #main { grid-template-columns: 1fr; }
            .modal-desc-wrap h2 { font-size: 3rem; }
            .modal-hero-container { height: 60vh; }
            .lower-left-meta { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header id="header">
        <h1><a href="#">Sprocklight / Bureau</a></h1>
        <nav>
            <a href="#">Home</a>
            <a href="#footer">Contact</a>
        </nav>
    </header>

    <div id="main">
        <article class="thumb" onclick="openProject('Visual Expertise.', 'Design Strategy', 'images/thumbs/01.jpg', 'Bridging the gap between technical precision and creative energy for WKNDR. High-contrast layouts and minimalist Swiss typography.', '1920 x 1080 PX', '2026')">
            <div class="image-wrap"><img src="images/thumbs/01.jpg" alt="WKNDR"></div>
            <div class="thumb-info"><h2>WKNDR Creative</h2><p>Identity • 2026</p></div>
        </article>

        <article class="thumb" onclick="openProject('Motion Clarity.', 'Visual Effects', 'images/thumbs/07.gif', 'High-fidelity motion design created for luxury branding at SkinCartel. Engineered for maximum consumer impact.', '1080 x 1080 PX', '2025')">
            <div class="image-wrap"><img src="images/thumbs/07.gif" alt="SkinCartel"></div>
            <div class="thumb-info"><h2>SkinCartel</h2><p>Motion • 2025</p></div>
        </article>

        <article class="thumb" onclick="openProject('Production Quality.', 'Photography', 'images/thumbs/02.jpg', 'Creative direction and full-scale photoshoot execution for Turbine Torcher. Integrated with high-performance standards.', '3000 x 2000 PX', '2026')">
            <div class="image-wrap"><img src="images/thumbs/02.jpg" alt="Turbine"></div>
            <div class="thumb-info"><h2>Turbine Torcher</h2><p>E-Comm • 2026</p></div>
        </article>
        
        </div>

    <div id="modal-overlay">
        <div class="modal-header">
            <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 2px;">PROJECT INDEX // SELECTION</span>
            <button class="close-btn" onclick="closeProject()">CLOSE</button>
        </div>

        <div class="modal-body">
            <div class="modal-hero-container">
                <img src="" id="modal-img" class="modal-main-img" alt="Hero">
            </div>

            <div class="modal-content-area">
                <div class="lower-left-meta">
                    <div>
                        <div class="meta-label">Technical Scale</div>
                        <div id="modal-dim" class="meta-value">0000 x 0000 PX</div>
                    </div>
                    <div>
                        <div class="meta-label">Completion</div>
                        <div id="modal-year" class="meta-value">2026</div>
                    </div>
                    <div>
                        <div class="meta-label">Domain</div>
                        <div id="modal-cat" class="meta-value">STRATEGY</div>
                    </div>
                </div>

                <div class="modal-desc-wrap">
                    <h2 id="modal-title">Title.</h2>
                    <p id="modal-text">Description...</p>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer">
        <div class="footer-grid">
            <div>
                <h2>Digital<br>Precision.</h2>
                <p style="margin-top: 2rem; opacity: 0.5; font-size: 0.75rem;">© 2026 SPROCKLIGHT DIGITAL SERVICES.</p>
            </div>
            <div>
                <form action="mailto:anthony.juco@gmail.com" method="post">
                    <input type="text" placeholder="NAME" required>
                    <input type="email" placeholder="EMAIL" required>
                    <textarea rows="3" placeholder="PROJECT BRIEF"></textarea>
                    <button type="submit" style="background:#fff; color:#001A70; border:none; padding:1rem 2rem; font-weight:800; cursor:pointer;">SUBMIT</button>
                </form>
            </div>
        </div>
    </footer>

    <script>
        function openProject(title, category, img, text, dim, year) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-cat').innerText = category;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-dim').innerText = dim;
            document.getElementById('modal-year').innerText = year;
            
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        function closeProject() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeProject(); });
    </script>
</body>
</html>
