<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Sprocklight | Strategic Advisory & Digital Precision</title>
    
    <link rel="icon" type="image/jpg" href="images/favicon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff; 
            --text-main: #001A70; /* Strategic Navy */
            --accent-orange: #FF4500; /* Original Brand Orange */
            --text-body: #2d3436;
            --line-color: #f2f2f2; 
            --header-bg: rgba(242, 242, 245, 0.9); 
            --glass-blur: blur(25px) saturate(140%);
            --radius: 8px; 
        }

        /* --- Global Reset & Scrollbar Stability --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        html { 
            height: 100%; 
            background-color: var(--bg-color); 
            scrollbar-gutter: stable; /* Crucial for Desktop close nudge */
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            background-attachment: fixed;
            height: 100%;
        }

        body.modal-open { overflow: hidden; }

        /* --- Header & Navigation (Brutalist Style) --- */
        #header {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 30px);
            left: 2%; right: 2%; width: 96%;
            z-index: 1000;
            padding: 0 3rem; 
            height: 70px; /* Fixed height for absolute alignment */
            background: var(--header-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #header.hidden { transform: translateY(calc(-100% - 100px)); }

        .logo {
            font-family: 'Inter', sans-serif; 
            font-weight: 700; 
            display: inline-flex;
            align-items: center; 
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: -0.02em; 
            line-height: 1; 
        }

        .logo span {
            display: inline-block;
            background-color: var(--accent-orange); 
            width: 0.35em; height: 0.35em; 
            margin-left: 0.2em; 
            transform: translateY(0.18em); 
        }

        nav { display: flex; align-items: center; height: 100%; }

        nav a { 
            position: relative;
            text-decoration: none; 
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 0.6rem; 
            text-transform: uppercase; 
            margin-left: 2.5rem; 
            letter-spacing: 1.5px;
            z-index: 1;
        }

        /* Brutalist Hover: A solid block that appears behind the text */
        nav a::before {
            content: '';
            position: absolute;
            left: -4px; right: -4px; bottom: 0;
            height: 0;
            background: var(--accent-orange);
            z-index: -1;
            transition: height 0.15s steps(4); /* Steps added for raw feel */
        }

        nav a:hover::before { height: 10px; }
        nav a:hover { color: #fff; }

        /* --- Grid Layout --- */
        #main {
            padding-top: 150px; display: grid; grid-template-columns: repeat(4, 1fr);
            background: #ffffff; gap: 1px; 
        }

        .thumb { 
            background: #fff; padding: 4rem 2.5rem; cursor: pointer; transition: 0.4s; 
            border-bottom: 1px solid var(--line-color); border-right: 1px solid var(--line-color);
        }
        .thumb:hover { background: #fafafa; }
        .thumb .image-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; margin-bottom: 1.8rem; border-radius: var(--radius); background: #f8f8f8; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .thumb:hover img { transform: scale(1.05); }

        .thumb-info h2 { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; color: var(--text-main); }
        .thumb-info p { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-weight: 400; }

        /* --- Modal System (Freeze & Settle) --- */
        #modal-overlay {
            position: fixed; inset: 0; width: 100%; height: 100dvh; 
            z-index: 9999; background: #ffffff; display: none;
            opacity: 0; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #modal-overlay.is-visible { opacity: 1; }

        .modal-header {
            position: fixed; top: calc(env(safe-area-inset-top, 0px) + 30px);
            left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 1000px;
            z-index: 10005; padding: 0.85rem 2.2rem;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: var(--glass-blur);
            border-radius: 100px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
        }

        .modal-hero-container { width: 100%; height: 80dvh; position: relative; background: #f8f8f8; padding: 25px; overflow: hidden; }
        .modal-main-img { 
            position: absolute; top: 25px; left: 25px; width: calc(100% - 50px); height: calc(100% - 50px); 
            object-fit: cover; border-radius: 12px; transform: scale(1.04); opacity: 0;
            transition: opacity 0.4s ease, transform 0.01s linear 0.8s;
        }
        #modal-overlay.is-visible .modal-main-img { transform: scale(1); opacity: 1; transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease; }

        .modal-content-area { 
            width: 100%; max-width: 1100px; margin: 0 auto; padding: 4rem 5% 10rem;
            opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.01s linear 0.8s;
        }
        #modal-overlay.is-visible .modal-content-area { opacity: 1; transform: translateY(0); transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s, opacity 0.8s ease 0.1s; }

        .lower-left-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; border-left: 2px solid var(--text-main); padding-left: 30px; margin-bottom: 3.5rem; }
        .meta-label { font-size: 0.55rem; font-weight: 800; color: #ccc; text-transform: uppercase; margin-bottom: 8px; }
        .meta-value { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }

        .modal-desc-wrap h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 7.5vw, 6rem); font-weight: 400; line-height: 0.85; color: var(--text-main); letter-spacing: -3px; margin-bottom: 2rem; }
        .modal-desc-wrap p { font-size: 1.4rem; line-height: 1.5; color: var(--text-body); max-width: 650px; font-weight: 400; }

        /* --- Next Project & Close Controls --- */
        .modal-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 6rem; border-top: 1px solid var(--line-color); padding-top: 4rem; }
        
        .next-project-link {
            font-family: 'Cormorant Garamond', serif; font-size: 3rem; text-decoration: none; color: var(--text-main);
            transition: transform 0.3s ease;
        }
        .next-project-link:hover { transform: translateX(10px); color: var(--accent-orange); }

        .agency-close-btn {
            display: inline-flex; align-items: center; justify-content: center;
            position: relative; width: 240px; height: 56px;
            background: var(--text-main); color: #ffffff;
            font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.6rem;
            text-transform: uppercase; letter-spacing: 2px; text-indent: 2px;
            border: none; border-radius: 100px; cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .agency-close-btn span { position: absolute; right: 20px; font-size: 0.8rem; }
        .agency-close-btn:hover { transform: translateY(-4px); background: var(--accent-orange); }

        /* --- Footer --- */
        #footer { padding: 10rem 5%; background: var(--text-main); color: #fff; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; max-width: 1100px; margin: 0 auto; align-items: end; }
        .footer-logo-wrap h2 { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; line-height: 0.85; letter-spacing: -2px; }
        .contact-link { color: #fff; text-decoration: none; font-size: 1.8rem; font-family: 'Cormorant Garamond', serif; display: block; margin-bottom: 0.8rem; transition: opacity 0.3s ease; }

        /* --- Mobile Hub --- */
        @media (max-width: 768px) {
            #header, .modal-header { width: 94%; height: 60px; padding: 0 1.5rem; top: calc(env(safe-area-inset-top, 0px) + 15px); }
            #header h1 a { font-size: 0.85rem; }
            nav a { margin-left: 1.2rem; font-size: 0.6rem; }
            #main { grid-template-columns: 1fr; padding-top: 100px; }
            .thumb { padding: 2.5rem 1.5rem; } 
            .modal-hero-container { height: 60dvh; padding: 15px; }
            .modal-main-img { width: calc(100% - 30px); height: calc(100% - 30px); top: 15px; left: 15px; }
            .lower-left-meta { grid-template-columns: 1fr; gap: 20px; }
            .modal-controls { flex-direction: column; gap: 3rem; align-items: flex-start; }
            .agency-close-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header id="header">
        <h1><a href="#" class="logo">SPROCKLIGHT<span></span></a></h1>
        <nav>
            <a href="https://sprocklight.github.io/home/">Home</a>
            <a href="#footer">Inquiry</a>
        </nav>
    </header>

    <div id="main">
        </div>

    <div id="modal-overlay">
        <div class="modal-header">
            <span style="font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;">PROJECT INDEX</span>
            <button class="close-trigger" onclick="closeProjectHandler()"></button>
        </div>
        <div class="modal-body">
            <div class="modal-hero-container">
                <img src="" id="modal-img" class="modal-main-img" alt="Project Hero">
            </div>
            <div id="modal-content" class="modal-content-area">
                <div class="lower-left-meta">
                    <div><div class="meta-label">Technical Scale</div><div id="modal-dim" class="meta-value">---</div></div>
                    <div><div class="meta-label">Completion</div><div id="modal-year" class="meta-value">---</div></div>
                    <div><div class="meta-label">Domain</div><div id="modal-cat" class="meta-value">---</div></div>
                </div>
                <div class="modal-desc-wrap">
                    <h2 id="modal-title">---</h2>
                    <p id="modal-text">---</p>
                </div>
                
                <div class="modal-controls">
                    <a href="javascript:void(0)" class="next-project-link" onclick="nextProject()">Next Project →</a>
                    <button class="agency-close-btn" onclick="closeProjectHandler()">
                        Close Project <span>✕</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer">
        <div class="footer-grid">
            <div class="footer-logo-wrap">
                <h2>Digital<br>Precision.</h2>
                <p style="margin-top:2.5rem; opacity:0.4; font-size:0.65rem; text-transform: uppercase; letter-spacing: 2px;">© 2026 SPROCKLIGHT MNL</p>
            </div>
            <div>
                <h3 style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 1.5rem;">Let's Talk</h3>
                <a href="mailto:anthony.juco@gmail.com" class="contact-link">anthony.juco@gmail.com <span>→</span></a>
                <a href="https://www.linkedin.com/company/sprocklightmnl/" target="_blank" class="contact-link">LinkedIn <span>↗</span></a>
            </div>
        </div>
    </footer>

    <script>
        // THE PROJECT DATA (Engineered Visual Pacing Order)
        const projects = [
            { id:0, title: 'Koffee Kart', cat: 'Identity • Logo', thumb: 'images/thumbs/00.jpg', hero: 'images/hero/00.jpg', text: 'Official brand identity system engineered for Koffee Kart.', dim: 'VECTOR', year: '2025' },
            { id:1, title: 'SkinCartel', cat: 'Motion Graphics • VFX', thumb: 'images/thumbs/07.gif', hero: 'images/hero/07.gif', text: 'High-fidelity motion design and visual effects created for luxury branding.', dim: '1080 x 1080', year: '2025' },
            { id:2, title: 'Madeleine Bettridge', cat: 'Agency Website • 2026', thumb: 'images/thumbs/md.jpg', hero: 'images/hero/md.jpg', text: 'Modern digital aesthetics engineered for a premium Interior Design agency.', dim: '1600 x 1200', year: '2026' },
            { id:3, title: 'Turbine Torcher', cat: 'Photography campaign', thumb: 'images/thumbs/02.jpg', hero: 'images/hero/02.jpg', text: 'Creative direction and full-scale photography photoshoot execution.', dim: '3000 x 2000', year: '2026' },
            { id:4, title: 'Fashion Creatives', cat: 'Graphic campaign', thumb: 'images/thumbs/01.jpg', hero: 'images/hero/01.jpg', text: 'High-energy visuals created for a modern fashion banner campaign.', dim: '1600 x 1200', year: '2026' },
            { id:5, title: 'Jaunter System', cat: 'UI • UX Architecture', thumb: 'images/thumbs/09.jpg', hero: 'images/hero/09.jpg', text: 'Original interface architecture for the Jaunter ecosystem.', dim: '1440 x 900', year: '2025' },
            { id:6, title: 'Jaunter V3', cat: 'Dynamic Interface', thumb: 'images/thumbs/13.gif', hero: 'images/hero/13.gif', text: 'Dynamic interface design created for the Jaunter Q3 social campaign.', dim: '1080 x 1350', year: '2026' },
            { id:7, title: 'Emerald Events', cat: 'Web Dev • SEO', thumb: 'images/thumbs/10.jpg', hero: 'images/hero/10.jpg', text: 'Technical transformation and development of The Emerald Events Place.', dim: '2560 x 1440', year: '2026' },
            { id:8, title: 'SkinCartel ID', cat: 'UI Assets • Design', thumb: 'images/thumbs/04.jpg', hero: 'images/hero/04.jpg', text: 'Secondary interface assets and icons for consistent luxury branding.', dim: '1920 x 800', year: '2025' },
            { id:9, title: 'Jaunter Airpods', cat: 'Editorial Concept', thumb: 'images/thumbs/03.jpg', hero: 'images/hero/03.jpg', text: 'Minimalist digital editing for the Jaunter Airpods collection.', dim: 'A4 PRINT', year: '2025' },
            { id:10, title: 'JN Leather', cat: 'Product • Visuals', thumb: 'images/thumbs/08.gif', hero: 'images/hero/08.gif', text: 'Digital asset creation for high-fidelity JN Leather textures.', dim: '1080 x 1080', year: '2025' },
            { id:11, title: 'Chef Maria', cat: 'Social • AD', thumb: 'images/thumbs/06.jpg', hero: 'images/hero/06.jpg', text: 'Targeted campaign assets for Chef Maria.', dim: '1200 x 628', year: '2025' },
            { id:12, title: 'JHome Ads', cat: 'Pinterest • Mobile', thumb: 'images/thumbs/05.jpg', hero: 'images/hero/05.jpg', text: 'Portrait-optimized Pinterest campaign for JHome.', dim: '1080 x 1920', year: '2025' }
        ];

        let currentIdx = 0;

        // Render Grid On Load
        const main = document.getElementById('main');
        projects.forEach((p, idx) => {
            const article = document.createElement('article');
            article.className = 'thumb';
            article.onclick = () => openProject(idx);
            article.innerHTML = `
                <div class="image-wrap"><img src="${p.thumb}" loading="lazy"></div>
                <div class="thumb-info"><h2>${p.title}</h2><p>${p.cat}</p></div>
            `;
            main.appendChild(article);
        });

        // Modal Logic
        function openProject(idx) {
            currentIdx = idx;
            const p = projects[idx];
            
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-cat').innerText = p.cat;
            document.getElementById('modal-img').src = p.hero;
            document.getElementById('modal-text').innerText = p.text;
            document.getElementById('modal-dim').innerText = p.dim;
            document.getElementById('modal-year').innerText = p.year;
            
            const overlay = document.getElementById('modal-overlay');
            overlay.style.display = 'flex';
            document.body.classList.add('modal-open');
            overlay.scrollTop = 0;
            
            if (window.location.hash !== '#project') {
                history.pushState({ modalOpen: true }, '', '#project');
            }
            
            void overlay.offsetWidth; 
            overlay.classList.add('is-visible');
        }

        function nextProject() {
            let nextIdx = (currentIdx + 1) % projects.length;
            // Immediate transition for cinematic feel
            openProject(nextIdx);
        }

        function triggerCloseAnimation() {
            const overlay = document.getElementById('modal-overlay');
            if (!overlay.classList.contains('is-visible')) return; 
            overlay.classList.remove('is-visible');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.classList.remove('modal-open');
            }, 600);
        }

        function closeProjectHandler() {
            triggerCloseAnimation();
            if (window.location.hash === '#project') history.back();
        }

        window.addEventListener('popstate', (e) => { if (document.body.classList.contains('modal-open')) triggerCloseAnimation(); });
        window.addEventListener('keydown', (e) => { if(e.key === 'Escape' && document.body.classList.contains('modal-open')) closeProjectHandler(); });

        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            if (document.body.classList.contains('modal-open')) return;
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const header = document.getElementById('header');
            if (scrollTop > lastScrollTop && scrollTop > 50) header.classList.add('hidden');
            else if (scrollTop < lastScrollTop) header.classList.remove('hidden');
            lastScrollTop = scrollTop;
        });
    </script>
</body>
</html>
